# Short-run smoke config for validating harness changes before a long run.
#
# Used to verify new features (ordering constraints, mechanism field,
# auto-consolidation) fire correctly against live LLM calls + real VM
# + real Postgres before burning GPU time on a 14-hour run.
#
# Sized to finish in ~15-30 minutes worst case:
#   - 12 rules max (enough to hit 2-3 categories + trigger audit deferral)
#   - 10 minutes wall budget per rule (half the full-run budget)
#   - Everything else matches the main config
loop:
  max_iterations: 20
  max_rules_per_run: 3          # just enough to exercise one full loop cycle
  max_retries_per_rule: 100
  max_wall_time_per_rule_s: 300  # 5 min per rule
  architect_reengage_every_n_attempts: 3
  architect_reengage_on_plateau: true
stig:
  datastream: /usr/share/xml/scap/ssg/content/ssg-rl9-ds.xml
  profile: xccdf_org.ssgproject.content_profile_stig
  results_dir: /tmp/gemma-forge-stig
vm:
  healthcheck_cmd: /usr/local/bin/mission-healthcheck.sh
  ip: 192.168.122.43
  ssh_key: /data/vm/gemma-forge/keys/adm-forge
  user: adm-forge
