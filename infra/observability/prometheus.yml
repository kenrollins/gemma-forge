# Prometheus scrape configuration for GemmaForge.
#
# Scrapes the OTel collector's Prometheus exporter endpoint for
# token accounting metrics (gen_ai.usage.*) and span-derived metrics.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "otel-collector"
    static_configs:
      - targets: ["otel-collector:8889"]
        labels:
          source: "gemma-forge-harness"

  # vLLM metrics endpoints (if needed in the future)
  # Each vLLM instance exposes Prometheus metrics on its metrics port.
  # Uncomment to scrape directly from vLLM:
  #
  # - job_name: "vllm-architect"
  #   static_configs:
  #     - targets: ["host.docker.internal:8052"]
  #
  # - job_name: "vllm-auditor"
  #   static_configs:
  #     - targets: ["host.docker.internal:8062"]
  #
  # - job_name: "vllm-sentry"
  #   static_configs:
  #     - targets: ["host.docker.internal:8072"]
