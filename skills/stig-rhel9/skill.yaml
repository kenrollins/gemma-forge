# GemmaForge Skill: DISA STIG Remediation for RHEL 9 / Rocky 9
#
# The first and headline skill. Autonomously scans a Rocky Linux 9
# target for DISA STIG compliance violations, remediates them one at
# a time, and verifies the mission app stays healthy after each fix.
#
# See ADR-0006 (DISA STIG profile, not CIS) and ADR-0005 (Rocky 9).

name: "DISA STIG Remediation — RHEL 9"
description: "Autonomous STIG compliance remediation against DISA RHEL 9 STIG on Rocky Linux 9, with revert-on-failure protection for the mission app."
version: "0.1.0"
target_os: "Rocky Linux 9"

prompts:
  architect: "prompts/architect.md"
  worker: "prompts/worker.md"
  auditor: "prompts/auditor.md"

tools:
  architect:
    - run_stig_scan
  worker:
    - apply_fix
  auditor:
    - check_health
    - revert_last_fix

validators:
  - name: "mission-app-health"
    command: "/usr/local/bin/mission-healthcheck.sh"
    success_pattern: "HEALTHY"
    failure_pattern: "UNHEALTHY"

stig:
  profile: "xccdf_org.ssgproject.content_profile_stig"
  datastream: "/usr/share/xml/scap/ssg/content/ssg-rl9-ds.xml"
  results_dir: "/tmp/gemma-forge-stig"

ordering_constraints:
  # audit_rules_immutable locks the kernel audit subsystem (auditctl -e 2).
  # Once applied, every subsequent audit_rules_* change fails at
  # "auditctl -e 1" until reboot. Defer it until audit has at most one
  # rule left unfinished — i.e., schedule it last within its category.
  # The Architect's prompt also says "process this rule LAST" but
  # prompt guidance is not enforcement (entry 25, entry 31) so the
  # harness filters it out of the candidate pool until the constraint
  # releases.
  - rule_id: "xccdf_org.ssgproject.content_rule_audit_rules_immutable"
    defer_until:
      predicate: category_nearly_complete
      category: audit
      remaining_lte: 1
    reason: "Locks kernel audit subsystem; defer until audit category is nearly complete."

ui:
  title: "STIG Remediation"
  work_item: "STIG rule"
  work_item_plural: "STIG rules"
  id_prefix_strip: "xccdf_org.ssgproject.content_rule_"
  fixed_label: "Remediated"
  outcomes:
    - { type: "fixed", label: "Remediated", color: "#22C55E" }
    - { type: "escalated", label: "Escalated", color: "#EF4444" }
    - { type: "skipped", label: "Skipped", color: "#6B7280" }
