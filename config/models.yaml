# GemmaForge model configuration
#
# Single model, full precision, all 4 GPUs:
#   Gemma 4 31B bf16 — TP=4 across all 4 L4s
#   No quantization. 14.8 tok/s. 17,968 token KV cache.
#   2× faster than GB10 DGX Spark at full precision.
#
# All three LLM roles (Architect, Worker, Reflector) share this engine
# sequentially. The Evaluator is deterministic Python — no LLM needed.

gemma:
  endpoint: "http://localhost:8050/v1"
  model: "/weights/gemma-4-31B-it"
  max_tokens: 2048
