# GemmaForge — Compose v2 spec.
#
# This file is consumed natively by `docker compose` (the runtime on the
# reference XR7620) and is also valid input to `podman compose`. The Compose
# v2 spec deliberately omits the legacy `version:` field and avoids
# Docker-only extensions so Federal customers running Podman on RHEL can
# bring this up unmodified. See docs/adr/0003-podman-primary-docker-compatible.md.
#
# IMPORTANT: This compose file describes ONLY the GemmaForge-scoped stack:
#   - the OTel-pure observability stack (otel-collector, jaeger,
#     prometheus, grafana) -- see docs/adr/0007-otel-jaeger-prometheus-grafana.md
#   - the FastAPI service and Next.js UI -- Phase 6
#
# It deliberately does NOT include:
#   - the Triton+vLLM inference plane: that is a SHARED HOST SERVICE under
#     /data/triton/ managed by systemd OUTSIDE this compose project. See
#     docs/adr/0014-triton-vllm-director-shared-host-service.md.
#   - Langfuse: dropped entirely in favor of the OTel-pure stack. See
#     docs/adr/0007-otel-jaeger-prometheus-grafana.md for the rationale.
#
# Bringing GemmaForge up therefore involves two steps:
#   1. (one-time, host-level) install + start the Triton director under
#      /data/triton/ via infra/triton/scripts/install.sh
#   2. (per-demo) `docker compose --profile observability --profile app up -d`
#      from this file to start the GemmaForge-scoped stack
#
# Phase 0.5 status: SKELETON. Service definitions are filled in by their
# respective phases (Phase 5 observability, Phase 6 application).

name: gemma-forge

networks:
  forge:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
  jaeger-data:

services:

  # ===========================================================================
  # Memory tier — Phase 10 (post-Run 3 pivot)
  #
  # Neo4j: Reflective tier (Graphiti bi-temporal graph memory).
  #
  # The relational tiers (Episodic, Semantic projection, run event history)
  # live in a `gemma_forge` database INSIDE the existing Supabase Postgres
  # on this host, with per-skill schemas (stig, <next>, ...) and
  # per-skill roles. That database is NOT managed by this compose file —
  # it is created once by tools/bootstrap_database.sh against the running
  # Supabase instance, and per-skill schemas are added by
  # tools/bootstrap_skill.sh. This matches the "be a client, don't
  # duplicate" host-services principle (see docs/adr/0016-*.md).
  #
  # Only Neo4j is net-new infrastructure. Data lives at
  # /data/neo4j/gemma-forge/ following the service-typed / project-scoped
  # convention (/data/<service>/<project>/, same shape as /data/vm/gemma-forge).
  # Port bindings are loopback-only. Bring up with:
  #     docker compose --profile memory up -d
  # ===========================================================================

  neo4j:
    # 5-community has the features Graphiti needs (vector + fulltext indexes,
    # APOC). Graphiti itself is installed as a Python dependency in the
    # harness; Neo4j only needs to accept Bolt connections.
    image: neo4j:5.26-community
    profiles: ["memory"]
    networks: [forge]
    restart: unless-stopped
    environment:
      # Initial auth: the password comes from .env. Neo4j will refuse to
      # start with the default "neo4j" password; NEO4J_AUTH below bootstraps
      # the admin user on a fresh data directory.
      NEO4J_AUTH: "neo4j/${NEO4J_PASSWORD:?NEO4J_PASSWORD must be set in .env}"
      # APOC is shipped with 5.26 community as an optional plugin; enable
      # the bundled version so Graphiti's schema helpers work out of the box.
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_apoc_export_file_enabled: "true"
      NEO4J_apoc_import_file_enabled: "true"
      # Modest sizing — revisit when the second skill lands and the
      # working set grows.
      NEO4J_server_memory_heap_initial__size: "${NEO4J_HEAP_INITIAL:-1G}"
      NEO4J_server_memory_heap_max__size: "${NEO4J_HEAP_MAX:-2G}"
      NEO4J_server_memory_pagecache_size: "${NEO4J_PAGECACHE:-1G}"
    volumes:
      # Project-scoped path under the service-typed root. Same shape as
      # /data/vm/gemma-forge/. A future demo on this host gets its own
      # Neo4j instance at /data/neo4j/<their-project>/ with its own port.
      - /data/neo4j/gemma-forge/data:/data
      - /data/neo4j/gemma-forge/logs:/logs
      - /data/neo4j/gemma-forge/plugins:/plugins
      - /data/neo4j/gemma-forge/import:/var/lib/neo4j/import
    ports:
      # Defaults (7474 HTTP, 7687 Bolt) are free on the reference XR7620.
      # Port 7688 is occupied by an unrelated service; confirmed no conflict
      # on 7687 or 7474 at scaffold time.
      - "127.0.0.1:${NEO4J_HTTP_HOST_PORT:-7474}:7474"
      - "127.0.0.1:${NEO4J_BOLT_HOST_PORT:-7687}:7687"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ===========================================================================
  # Observability — Phase 5
  # OTel-pure stack: instrumentation in the harness flows OTLP to a single
  # collector, which fans out to Jaeger (traces) and Prometheus (metrics).
  # Token accounting is done via the OpenTelemetry GenAI semantic conventions
  # (gen_ai.* attributes), with token counters scraped by Prometheus and
  # surfaced in Grafana dashboards. No Langfuse, no SaaS, no vendor lock-in.
  #
  # See docs/adr/0007-otel-jaeger-prometheus-grafana.md.
  # ===========================================================================

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.121.0
    profiles: ["observability"]
    networks: [forge]
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./infra/observability/otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"  # OTLP gRPC (harness exporters)
      - "4318:4318"  # OTLP HTTP (browser / fetch-based clients)
      - "8889:8889"  # Prometheus exporter scrape endpoint
    depends_on:
      - jaeger
      - prometheus

  jaeger:
    image: jaegertracing/jaeger:2.4.0
    profiles: ["observability"]
    networks: [forge]
    ports:
      - "16686:16686"  # Jaeger UI
    environment:
      # Jaeger v2 is OTel-native; it ingests OTLP directly via the collector.
      LOG_LEVEL: info
    volumes:
      - jaeger-data:/var/lib/jaeger

  prometheus:
    image: prom/prometheus:v3.1.0
    profiles: ["observability"]
    networks: [forge]
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    volumes:
      - ./infra/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9092:9090"  # 9090 is taken by MinIO on this host

  grafana:
    image: grafana/grafana:11.4.0
    profiles: ["observability"]
    networks: [forge]
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-admin}"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./infra/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3002:3000"  # 3001 is taken by Langfuse on this host
    depends_on:
      - prometheus
      - jaeger

  # ===========================================================================
  # Application plane — Phase 6
  # The FastAPI service is the only component that talks to the Triton
  # director on the host. The UI never reaches Triton directly; it goes
  # through forge-api over WebSockets and REST.
  # ===========================================================================

  forge-api:
    build:
      context: .
      dockerfile: web/api/Dockerfile
    profiles: ["app"]
    networks: [forge]
    ports:
      - "8080:8080"
    environment:
      # The Triton director lives outside this compose project on the host.
      # Override these via .env if your host layout differs.
      TRITON_DIRECTOR_URL: "${TRITON_DIRECTOR_URL:-http://host.containers.internal:8000}"
      TRITON_MODEL_REPO: "${TRITON_MODEL_REPO:-/data/triton/models}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
      OTEL_SERVICE_NAME: "gemma-forge.api"
    depends_on:
      - otel-collector

  forge-ui:
    build:
      context: ./web/ui
    profiles: ["app"]
    networks: [forge]
    ports:
      - "3000:3000"
