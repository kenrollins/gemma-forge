name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Minimum permissions for the default workflow runs.
# Phase 7 (supply-chain hardening) extends this with id-token: write for
# keyless Cosign signing via GitHub OIDC.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  python-lint-and-type:
    name: Python — ruff + mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: ruff check
        run: ruff check .

      - name: ruff format --check
        run: ruff format --check .

      - name: mypy
        run: mypy gemma_forge

  python-test:
    name: Python — pytest
    runs-on: ubuntu-latest
    needs: python-lint-and-type
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: pytest
        run: pytest --cov=gemma_forge --cov-report=term-missing

  compose-validate:
    name: docker compose — validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Compose v2 file
        run: docker compose -f docker-compose.yml config --quiet

  # Phase 7 will add: sbom (Syft), image signing (Cosign keyless via OIDC),
  # OpenSSF Scorecard (weekly schedule), Dependabot (already wired via
  # .github/dependabot.yml).
  #
  # Phase 8 will add: air-gap-test job that runs the full Ralph loop with
  # egress blocked except localhost + the libvirt subnet. See
  # docs/adr/0010-air-gap-as-first-class-test.md.
