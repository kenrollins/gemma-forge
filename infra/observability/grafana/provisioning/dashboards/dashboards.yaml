# Auto-provisioned Grafana dashboard provider for GemmaForge.
# Loads dashboard JSON files from the mounted directory.

apiVersion: 1

providers:
  - name: "GemmaForge"
    orgId: 1
    folder: "GemmaForge"
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
